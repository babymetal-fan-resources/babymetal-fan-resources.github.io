      日本最大級のメタル・フェス"LOUD PARK 13"さんからまさかのお招きを頂いてBABYMETALラウパ初出演決定DEATH！！サマソニで"メタルマスター"から学んだ教えを心に刻んでステージに挑みます！！両日ともに必見！！
    translation: |-
      We've received an unexpected invitation from Japan's largest metal festival "LOUD PARK 13," and BABYMETAL's first LauPa appearance is confirmed DEATH!!
      We will take the stage with the lessons learned from the "Metal Master" at Summer Sonic engraved in our hearts!!
      A must-see on both days!!
