      Thank you for coming to BABYMETAL WORLD TOUR 2025-2026 SPECIAL ARENA SHOW IN JAPAN LEGEND - METAL FORTH DAY1 !!
      
      Tomorrow's merchandise sales numbered tickets will be distributed from 9:00 at:
      [Numbered tickets for CHO MOSH'SH PIT/SEAT] Near the stairs next to Gate B
      [Numbered tickets for other general tickets] Near the stairs next to Gate A
      
