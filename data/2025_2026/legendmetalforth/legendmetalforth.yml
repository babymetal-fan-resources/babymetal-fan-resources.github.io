    published-date: 2026-01-11
    text: |-
      「#BABYMETAL FIRST EVER POP-UP IN TOKYO」
      SHIBUYA TSUTAYA 1階にて1.13(火)まで開催中🎊
      
      先日完売となった人気商品の一部および「LEGEND - METAL FORTH」グッズの一部が明日より販売いたします。数に限りがございます。
      なくなり次第、販売終了となります。
      また、ライブで使用された杖🦯が新たに展示されましたので、ぜひチェックしてみてください!!
    translation: |-
      "#BABYMETAL FIRST EVER POP-UP IN TOKYO"
      Currently held at SHIBUYA TSUTAYA 1F until 1.13 (Tue)🎊
      
      From tomorrow, some popular items that were recently sold out and some "LEGEND - METAL FORTH" goods will be on sale. Quantities are limited.
      Sales will end as soon as stock runs out.
      Also, the cane🦯 used in the live performance is now newly on display, so please check it out!!
