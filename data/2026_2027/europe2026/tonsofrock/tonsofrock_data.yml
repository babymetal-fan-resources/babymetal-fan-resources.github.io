- postinstagram:
    id: DQWNpCFjeVn
    account: tonsofrock
    label: Lineup reveal
    published-date: 2025-10-28
    text: |-
      Vi fyller på plakaten med 15 nye navn, i tillegg kan du nå også se hvilken dag dine yndlingsartister skal spille⏰
      
      💥YUNGBLUD💥THE OFFSPRING💥A PERFECT CIRCLE💥TOM MORELLO💥  BABYMETAL💥D-A-D💥CAVALERA performing CHAOS A.D💥THE PRETTY RECKLESS💥BLACK LABEL SOCIETY💥APOCALYPTICA💥 DEATH TO ALL💥AUDREY HORNE💥ELDER💥GATECREEPER💥GAEREA💥
      
      🎫Dagspass er i salg fredag 31.okt kl 10:00.
      🤫Meld deg på vårt nyhetsbrev for å få tilgang på forhåndssalget som starter torsdag 30.okt kl 10:00 (link i bio)
      
      Forrige forhåndssalg ble utsolgt på rekordtid, så her gjelder det å være rask på labben!🏃‍♀️
    translation: |-
      We are filling up the poster with 15 new names, and you can also now see which day your favorite artists will play ⏰
      
      💥YUNGBLUD💥THE OFFSPRING💥A PERFECT CIRCLE💥TOM MORELLO💥  BABYMETAL💥D-A-D💥CAVALERA performing CHAOS A.D💥THE PRETTY RECKLESS💥BLACK LABEL SOCIETY💥APOCALYPTICA💥 DEATH TO ALL💥AUDREY HORNE💥ELDER💥GATECREEPER💥GAEREA💥
      
      🎫 Day passes go on sale Friday, October 31st at 10:00.
      🤫 Sign up for our newsletter to get access to the pre-sale which starts Thursday, October 30th at 10:00 (link in bio)
      
      The previous pre-sale sold out in record time, so you have to be quick here! 🏃‍♀️
