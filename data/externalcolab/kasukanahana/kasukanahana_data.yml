      - a: st
        ol:
        - 強くありたいと願って僕は
        en:
        - Wishing to be strong, I
      - a: st
        ol:
        - 捨てた弱さ、また拾っていました
        en:
        - picked up the vulnerability I had once cast away
      - a: s
        ol:
        - 迷いは断ち切れない、迷いながら僕になって
        en:
        - Can't break free from the ambivalence, in ambivalence, I become myself
      - a: st
        ol:
        - 土に逞しく根を張るように、風にはかなく揺れ動くように
        en:
